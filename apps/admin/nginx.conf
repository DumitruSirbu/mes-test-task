# Static-SPA nginx config for the admin container.
# Listens on 5174 to mirror the Vite dev server port (host mapping stays 5174:5174).
# `try_files ... /index.html` enables client-side routing fallback for the hash-router SPA.

server {
    listen       5174;
    server_name  _;

    access_log off;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache hashed assets emitted by Vite (filenames include a content hash).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: any unknown path resolves to index.html so the router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
